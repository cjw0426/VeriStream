  <path d="M335 410 H410" class="flow"/><path d="M620 410 H695" class="flow"/><path d="M905 410 H980" class="flow"/><path d="M1190 410 H1265" class="flow"/>
  <path d="M800 360 C800 300 750 270 750 220" class="feedback"/><path d="M1085 360 C1085 285 1065 260 1065 220" class="feedback"/>
  <text x="770" y="286" class="small">按需回溯</text><text x="1095" y="280" class="small">原始帧核验</text>

  <rect x="35" y="575" width="1430" height="190" fill="#f7f7f5" stroke="#d4a252" stroke-width="8"/>
  <text x="60" y="608" class="section">验证门控与答案</text>
  <rect x="110" y="650" width="260" height="75" class="box" fill="#fff4dc" stroke="#d4a252"/>
  <text x="240" y="681" text-anchor="middle" class="label">候选证据</text><text x="240" y="705" text-anchor="middle" class="small">candidate / quarantined</text>
  <rect x="505" y="650" width="260" height="75" class="box" fill="#e6f4f1" stroke="#2a9d8f"/>
  <text x="635" y="681" text-anchor="middle" class="label">已核验证据</text><text x="635" y="705" text-anchor="middle" class="small">verified + 原始帧引用</text>
  <rect x="900" y="650" width="300" height="75" class="box" fill="#eaf0fb" stroke="#4a90d9"/>
  <text x="1050" y="681" text-anchor="middle" class="label">最终推理器</text><text x="1050" y="705" text-anchor="middle" class="small">问题 + 已核验证据 → 答案</text>
  <rect x="1310" y="650" width="100" height="75" class="box" fill="#eef2f7" stroke="#7b8794"/>
  <text x="1360" y="681" text-anchor="middle" class="label">A</text><text x="1360" y="705" text-anchor="middle" class="small">输出</text>
  <path d="M370 687 H505" class="flow"/><path d="M765 687 H900" class="flow"/><path d="M1200 687 H1310" class="flow"/>
</svg>
