<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#52606d"/>
    </marker>
    <style>
      .title{font:700 26px Arial,sans-serif;fill:#1f2933}.section{font:700 18px Arial,sans-serif;fill:#1f2933}
      .label{font:600 17px Arial,sans-serif;fill:#1f2933}.small{font:400 15px Arial,sans-serif;fill:#364152}
      .box{stroke-width:2;rx:10}.flow{stroke:#52606d;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .feedback{stroke:#7b8794;stroke-width:2;stroke-dasharray:7 6;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1500" height="820" fill="#ffffff"/>
  <text x="750" y="42" text-anchor="middle" class="title">VeriStream: Causal Evidence Memory with Decoupled Perception and Reasoning</text>

  <rect x="35" y="75" width="1430" height="170" fill="#f7f7f5" stroke="#4a90d9" stroke-width="8"/>
  <text x="60" y="108" class="section">输入与因果感知</text>
  <rect x="75" y="135" width="180" height="75" class="box" fill="#eef2f7" stroke="#7b8794"/>
  <text x="165" y="166" text-anchor="middle" class="label">视频 V</text><text x="165" y="190" text-anchor="middle" class="small">问题 q，时刻 t_q</text>
  <rect x="325" y="135" width="220" height="75" class="box" fill="#eef2f7" stroke="#7b8794"/>
  <text x="435" y="166" text-anchor="middle" class="label">因果切片器</text><text x="435" y="190" text-anchor="middle" class="small">只保留 t ≤ t_q</text>
  <rect x="615" y="125" width="270" height="95" class="box" fill="#e6f4f1" stroke="#2a9d8f"/>
  <text x="750" y="158" text-anchor="middle" class="label">感知角色</text><text x="750" y="183" text-anchor="middle" class="small">冻结 Qwen3-VL</text><text x="750" y="204" text-anchor="middle" class="small">粗粒度观察 + 时间锚点</text>
  <rect x="955" y="125" width="220" height="95" class="box" fill="#fff4dc" stroke="#d4a252"/>
  <text x="1065" y="158" text-anchor="middle" class="label">L0 / L1</text><text x="1065" y="183" text-anchor="middle" class="small">原始指针 + 局部观察</text><text x="1065" y="204" text-anchor="middle" class="small">候选、置信度、来源</text>
  <rect x="1245" y="135" width="180" height="75" class="box" fill="#fff4dc" stroke="#d4a252"/>
  <text x="1335" y="166" text-anchor="middle" class="label">L2 事件记忆</text><text x="1335" y="190" text-anchor="middle" class="small">实体与时间聚合</text>
  <path d="M255 172 H325" class="flow"/><path d="M545 172 H615" class="flow"/><path d="M885 172 H955" class="flow"/><path d="M1175 172 H1245" class="flow"/>

  <rect x="35" y="285" width="1430" height="250" fill="#f7f7f5" stroke="#5ba58b" stroke-width="8"/>
  <text x="60" y="318" class="section">问题级检索与工具编排</text>
  <rect x="90" y="360" width="245" height="100" class="box" fill="#eaf0fb" stroke="#4a90d9"/>
  <text x="212" y="394" text-anchor="middle" class="label">推理角色</text><text x="212" y="420" text-anchor="middle" class="small">冻结 Qwen3-VL</text><text x="212" y="443" text-anchor="middle" class="small">受限 JSON 控制器</text>
  <rect x="410" y="360" width="210" height="100" class="box" fill="#f8e9e7" stroke="#d55e00"/>
  <text x="515" y="394" text-anchor="middle" class="label">search_memory</text><text x="515" y="420" text-anchor="middle" class="small">词元 + 实体 + 时间</text><text x="515" y="443" text-anchor="middle" class="small">候选 L3 工作集</text>
  <rect x="695" y="360" width="210" height="100" class="box" fill="#f8e9e7" stroke="#d55e00"/>
  <text x="800" y="394" text-anchor="middle" class="label">inspect_segment</text><text x="800" y="420" text-anchor="middle" class="small">局部重新观察</text><text x="800" y="443" text-anchor="middle" class="small">更新 L1/L2</text>
  <rect x="980" y="360" width="210" height="100" class="box" fill="#f8e9e7" stroke="#d55e00"/>
  <text x="1085" y="394" text-anchor="middle" class="label">verify_evidence</text><text x="1085" y="420" text-anchor="middle" class="small">回取原始帧</text><text x="1085" y="443" text-anchor="middle" class="small">支持 / 冲突 / 隔离</text>
  <rect x="1265" y="360" width="150" height="100" class="box" fill="#f8e9e7" stroke="#d55e00"/>
